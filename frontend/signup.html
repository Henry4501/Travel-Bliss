<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up | Travel Bliss</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="glass">
    <a href="index.html" class="logo">TRAVEL BLISS</a>
  </nav>
  <div class="auth-page">
    <div class="glass-dark auth-form" style="padding: 40px; border-radius: 16px; width: 400px; box-shadow: 0 10px 40px rgba(0,0,0,0.5);">
      <h2>Create an Account</h2>
      <p>Join us to unlock premium features.</p>
      <form id="signup-form" style="padding: 0; max-width: 100%;">
        <input type="text" id="signup-name" placeholder="Full Name" required />
        <input type="email" id="signup-email" placeholder="Email Address" required />
        <input type="password" id="signup-password" placeholder="Password" required />
        <button type="submit" class="btn" style="width: 100%;">Sign Up</button>
      </form>
      <p style="margin-top: 20px;">Already have an account? <a href="login.html">Log in</a></p>
    </div>
  </div>
  <script src="auth.js"></script>
</body>
</html>
